name: finalproject
description: SPK Pemilihan Tempat Magang - Metode MOORA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  google_sign_in: ^7.0.0

  # HTTP Client
  dio: ^5.4.3+1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Model serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Secure local storage
  flutter_secure_storage: ^9.2.2

  cupertino_icons: ^1.0.8
  image_picker: ^1.2.2
  google_generative_ai: ^0.4.7
  url_launcher: ^6.3.1
  intl: ^0.20.2
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
